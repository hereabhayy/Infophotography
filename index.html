<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFO Photography</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

.hero{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

.hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:800px;
  padding:20px;
}

.hero h1{
  font-size:70px;
  margin-bottom:20px;
}

.hero p{
  color:#ccc;
  font-size:24px;
}

.btns{
  margin-top:40px;
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  padding:14px 28px;
  text-decoration:none;
  border-radius:12px;
  transition:0.3s;
  font-weight:bold;
}

.primary{
  background:#fff;
  color:#000;
}

.secondary{
  border:1px solid #fff;
  color:#fff;
}

.primary:hover,
.secondary:hover{
  transform:translateY(-4px);
}

.secondary:hover{
  background:#fff;
  color:#000;
}

section{
  padding:100px 8%;
}

.title{
  text-align:center;
  margin-bottom:60px;
}

.title h2{
  font-size:50px;
  margin-bottom:10px;
}

.title p{
  color:#aaa;
}

.about{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:50px;
  align-items:center;
}

.about img{
  width:100%;
  border-radius:25px;
  height:450px;
  object-fit:cover;
}

.about h2{
  font-size:48px;
  margin-bottom:20px;
}

.about p{
  color:#bbb;
  line-height:1.8;
}

.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  margin-top:40px;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
}

.card h3{
  font-size:40px;
}

.gallery{
  background:#111;
}

.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.gallery-item{
  overflow:hidden;
  border-radius:20px;
}

.gallery-item img{
  width:100%;
  height:320px;
  object-fit:cover;
  transition:0.5s;
}

.gallery-item:hover img{
  transform:scale(1.1);
}

.services-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

.service{
  background:rgba(255,255,255,0.08);
  padding:40px;
  border-radius:20px;
  transition:0.3s;
}

.service:hover{
  background:#fff;
  color:#000;
  transform:translateY(-10px);
}

.service p{
  margin-top:15px;
}

.contact{
  background:#111;
}

.contact-box{
  max-width:700px;
  margin:auto;
  text-align:center;
}

form{
  margin-top:40px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

input,textarea{
  padding:16px;
  border:none;
  border-radius:12px;
  background:#222;
  color:#fff;
}

button{
  border:none;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:30px;
  color:#777;
  border-top:1px solid #222;
}

.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:14px 20px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  z-index:999;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

@media(max-width:768px){
  .hero h1{
    font-size:42px;
  }

  .hero p{
    font-size:18px;
  }

  .title h2,
  .about h2{
    font-size:36px;
  }
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-content fade">
    <h1>INFO PHOTOGRAPHY</h1>
    <p>Capturing moments that last forever</p>

    <div class="btns">
      <a href="#gallery" class="btn primary">Explore Gallery</a>
      <a href="#contact" class="btn secondary">Contact</a>
    </div>
  </div>
</section>

<section class="gallery" id="gallery">
  <div class="title fade">
    <h2>Gallery</h2>
    <p>Our best photography collection</p>
  </div>

  <div class="gallery-grid" id="galleryGrid"></div>
</section>

<section class="contact" id="contact">
  <div class="contact-box fade">
    <h2>Book Your Shoot</h2>
    <p>Let's create something amazing together.</p>

    <form id="contactForm">

      <input type="text" id="name" placeholder="Your Name" required>

      <input type="email" id="email" placeholder="Your Email" required>

      <input type="tel" id="phone" placeholder="WhatsApp Number" required>

      <textarea id="message" rows="5" placeholder="Message"></textarea>

      <button type="submit" class="btn primary">
        Send Message
      </button>

    </form>
  </div>
</section>

<a href="https://wa.me/919301280095" class="whatsapp-float" target="_blank">
  WhatsApp Us
</a>

<footer>
  <p>© 2025 INFO Photography</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
// Replace these with your EmailJS details
emailjs.init("YOUR_PUBLIC_KEY");

document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();

  emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    message: document.getElementById("message").value
  }).then(function(){
    alert("Message Sent Successfully!");
  }, function(error){
    alert("Failed: " + JSON.stringify(error));
  });
});

const images = [
'https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=1200&auto=format&fit=crop',
'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=1200&auto=format&fit=crop',
'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop'
];

const gallery = document.getElementById('galleryGrid');

images.forEach(img => {
  const div = document.createElement('div');
  div.classList.add('gallery-item');
  div.innerHTML = `<img src="${img}">`;
  gallery.appendChild(div);
});
</script>

</body>
</html>
